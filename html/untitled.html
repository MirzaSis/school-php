<!doctype html>
<html>
<head>
<style>
#myDiv {
  width: 300px;
  height: 300px;
  position: relative;
}

#myDiv img {
  width: 100%;
  height: 100%;
}

#myDiv span {
  position: absolute;
  bottom: -50px;
  left: 0;
  width: 100%;
  height: 50px;
  background-color: rgba(128, 128, 128, 0.4);
  color: white;
  font-size: 24px;
  text-align: center;
  line-height: 50px;
  opacity: 0;
  transition: all 0.5s ease-in-out;
}

#myDiv:hover span {
  bottom: 0;
  opacity: 1;
}
</style>
</head>
<body>
<div id="myDiv" onmouseover="changeColor()">
  <img src="../img/photo_2024-01-23_21-42-25 (2).jpg" alt="A flower">
  <span>سلام دنیا</span>
</div>
</body>
</html>
